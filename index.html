<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICP - Plataforma de Gestión Institucional de Capacitaciones</title>
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="importmap">
    {
      "imports": {
        "preact": "https://esm.sh/preact@10.19.2",
        "preact/hooks": "https://esm.sh/preact@10.19.2/hooks",
        "htm": "https://esm.sh/htm@3.1.1",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "jspdf": "https://esm.sh/jspdf@2.5.1"
      }
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --secondary: #2563eb; --ids-red: #cc0000; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .card:hover { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); transform: translateY(-2px); }
        .btn-primary { background: var(--primary); color: white; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.65rem; padding: 0.8rem 1.6rem; border-radius: 0.5rem; transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .sidebar-link { display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem 1.2rem; border-radius: 0.8rem; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; color: #64748b; transition: all 0.2s; }
        .sidebar-link.active { background: #f1f5f9; color: var(--primary); }
        .sidebar-link:hover:not(.active) { background: #f8fafc; color: #334155; transform: translateX(5px); }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .table-header { padding: 1.2rem 1.5rem; text-align: left; font-size: 0.6rem; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.15em; border-bottom: 2px solid #f1f5f9; }
        .table-row { border-bottom: 1px solid #f1f5f9; }
        .table-row:hover { background-color: #f8fafc; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.75rem 1rem; font-size: 0.875rem; width: 100%; transition: all 0.2s; }
        input:focus { border-color: var(--secondary); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { h, render, createContext } from 'preact';
        import { useState, useEffect, useContext, useRef } from 'preact/hooks';
        import htm from 'htm';
        import { initializeApp } from 'firebase/app';
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from 'firebase/auth';
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, collection, query, orderBy, where, addDoc, deleteDoc, serverTimestamp } from 'firebase/firestore';
        import { jsPDF } from 'jspdf';

        const html = htm.bind(h);

        // --- FIREBASE CONFIG (PROPORCIONADO) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCZ5KZsb0CEVxQdR6To8RhjPdVHmPnm_Jw",
            authDomain: "capacitacionesids.firebaseapp.com",
            projectId: "capacitacionesids",
            storageBucket: "capacitacionesids.firebasestorage.app",
            messagingSenderId: "758439138023",
            appId: "1:758439138023:web:58c5b801baf8bffe9c4842"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CONTEXT ---
        const GlobalContext = createContext();
        const AppProvider = ({ children }) => {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [config, setConfig] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubAuth = onAuthStateChanged(auth, u => {
                    setUser(u);
                    if (u) {
                        onSnapshot(doc(db, "users", u.uid), s => {
                            if (s.exists()) setUserData({ uid: u.uid, ...s.data() });
                            setLoading(false);
                        });
                    } else { setUserData(null); setLoading(false); }
                });

                onSnapshot(doc(db, "config", "global"), s => {
                    if (s.exists()) setConfig(s.data());
                    else {
                        const def = {
                            institution: "Instituto Departamental de Salud",
                            municipios: [{id: "1", n: "San José de Cúcuta"}],
                            areas: {at: {"vig": "Vigilancia"}, sp: {"obs": "Observatorio"}},
                            metas: {mensual: 4, pct: 85},
                            colors: {primary: "#0f172a", secondary: "#2563eb"}
                        };
                        setConfig(def);
                        setDoc(doc(db, "config", "global"), def);
                    }
                });
                return () => unsubAuth();
            }, []);

            return html`<${GlobalContext.Provider} value=${{ user, userData, config, loading, logout: () => signOut(auth) }}>${children}<//>`;
        };

        const useApp = () => useContext(GlobalContext);

        // --- COMPONENTS ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const paths = {
                dash: "M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z",
                plan: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z",
                exec: "M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4",
                actas: "M14 1V5H19 M14 1L20 7V20C20 21 19 22 18 22H6C5 22 4 21 4 20V4C4 3 5 2 6 2H14z",
                settings: "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z",
                logout: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9",
                user: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"
            };
            return html`<svg xmlns="http://www.w3.org/2000/svg" width=${size} height=${size} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class=${className}><path d=${paths[name] || ""} /></svg>`;
        };

        const Modal = ({ isOpen, onClose, title, children, footer }) => {
            if (!isOpen) return null;
            return html`
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick=${onClose}></div>
                    <div class="card w-full max-w-4xl max-h-[90vh] flex flex-col z-10 animate-in">
                        <div class="p-8 border-b border-slate-100 flex items-center justify-between">
                            <h3 class="text-xs font-black uppercase tracking-widest text-slate-900">${title}</h3>
                            <button onClick=${onClose} class="text-slate-400 hover:text-red-500 transition-colors"><${Icon} name="logout" size=${16}/></button>
                        </div>
                        <div class="flex-1 overflow-y-auto p-10">${children}</div>
                        ${footer && html`<div class="p-8 bg-slate-50 flex gap-4 justify-end">${footer}</div>`}
                    </div>
                </div>
            `;
        };

        // --- VIEWS ---

        const Dashboard = ({ caps, plans }) => {
            const { config } = useApp();
            const totalAsis = caps.reduce((a, b) => a + (b.asistentes || 0), 0);
            const avgEff = caps.length ? (caps.reduce((a, b) => a + (parseFloat(b.postest) || 0), 0) / caps.length).toFixed(1) : 0;
            
            return html`
                <div class="space-y-12 animate-in">
                    <div class="flex justify-between items-end">
                        <div class="space-y-1">
                            <h1 class="text-3xl font-black text-slate-950 tracking-tighter uppercase">Panel Estratégico</h1>
                            <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] ml-1">Consolidado de Gestión Institucional</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        ${[
                            { l: 'Ejecuciones', v: caps.length, s: 'Jornadas realizadas' },
                            { l: 'Impacto', v: totalAsis, s: 'Funcionarios certificados' },
                            { l: 'Eficacia', v: `${avgEff}%`, s: `Meta: ${config?.metas?.pct || 80}%` }
                        ].map(c => html`
                            <div class="card p-10 space-y-4 relative overflow-hidden group">
                                <div class="absolute top-0 right-0 w-32 h-32 bg-slate-50 rounded-full blur-3xl -mr-16 -mt-16 group-hover:bg-blue-50 transition-colors"></div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${c.l}</p>
                                <p class="text-5xl font-black text-slate-950 tracking-tighter">${c.v}</p>
                                <p class="text-[9px] font-bold text-slate-400 uppercase border-t border-slate-50 pt-4">${c.s}</p>
                            </div>
                        `)}
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div class="card p-10">
                            <h3 class="text-xs font-black uppercase mb-8 border-b pb-4">Actividad en Municipios</h3>
                            <div class="space-y-4">
                                ${config?.municipios?.slice(0, 5).map(m => html`
                                    <div class="space-y-2">
                                        <div class="flex justify-between text-[10px] font-black uppercase text-slate-500">
                                            <span>${m.n}</span>
                                            <span>${Math.floor(Math.random() * 100)}%</span>
                                        </div>
                                        <div class="h-1.5 bg-slate-50 rounded-full overflow-hidden">
                                            <div class="h-full bg-slate-950 rounded-full" style="width: ${Math.floor(Math.random() * 100)}%"></div>
                                        </div>
                                    </div>
                                `)}
                            </div>
                        </div>
                        <div class="bg-slate-950 rounded-[1.5rem] p-10 text-white flex flex-col justify-between shadow-2xl relative overflow-hidden">
                            <div class="absolute top-0 right-0 w-64 h-64 bg-blue-600/10 rounded-full blur-[100px]"></div>
                            <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Ejecución Presupuestal / Metas</h3>
                            <div class="py-12 flex items-center justify-center">
                                <div class="text-center">
                                    <p class="text-7xl font-black tracking-tighter">${Math.round((caps.length / (plans.length || 1)) * 100)}%</p>
                                    <p class="text-[9px] font-black uppercase text-slate-500 tracking-widest mt-4">Cumplimiento del Plan de Acción</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        const Planning = ({ plans }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [form, setForm] = useState({});
            const { userData, config } = useApp();

            const save = async () => {
                const p = { ...form, status: 'Planeado', createdBy: userData.uid, createdAt: serverTimestamp() };
                await addDoc(collection(db, "plans"), p);
                setIsModalOpen(false);
            };

            return html`
                <div class="space-y-10 animate-in">
                    <div class="flex justify-between items-end">
                        <h1 class="text-3xl font-black text-slate-950 tracking-tighter uppercase">Planeación Anual</h1>
                        <button onClick=${() => setIsModalOpen(true)} class="btn-primary">Nueva Proyección</button>
                    </div>
                    <div class="card overflow-hidden">
                        <table class="w-full">
                            <thead><tr class="bg-slate-50/50">
                                <th class="table-header">Capacitación</th>
                                <th class="table-header">Mes</th>
                                <th class="table-header">Responsable</th>
                                <th class="table-header text-right">Estatus</th>
                            </tr></thead>
                            <tbody>
                                ${plans.map(p => html`
                                    <tr class="table-row">
                                        <td class="table-cell font-black text-xs uppercase">${p.name}</td>
                                        <td class="table-cell text-xs font-bold">${p.mes}</td>
                                        <td class="table-cell text-xs font-bold text-slate-400">${p.responsable}</td>
                                        <td class="table-cell text-right"><span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black uppercase rounded-full">${p.status}</span></td>
                                    </tr>
                                `)}
                            </tbody>
                        </table>
                    </div>
                    <${Modal} isOpen=${isModalOpen} onClose=${() => setIsModalOpen(false)} title="Programación de Jornada" footer=${html`<button onClick=${save} class="btn-primary">Programar Actividad</button>`}>
                        <div class="grid grid-cols-2 gap-8">
                            <div class="space-y-2"><label class="text-[10px] font-black uppercase text-slate-400">Título</label>
                            <input onInput=${e => setForm({...form, name: e.target.value})} placeholder="Nombre de la capacitación" /></div>
                            <div class="space-y-2"><label class="text-[10px] font-black uppercase text-slate-400">Mes</label>
                            <select onInput=${e => setForm({...form, mes: e.target.value})}><option>Enero</option><option>Febrero</option><option>Marzo</option></select></div>
                            <div class="space-y-2 col-span-2"><label class="text-[10px] font-black uppercase text-slate-400">Responsable</label>
                            <input onInput=${e => setForm({...form, responsable: e.target.value})} placeholder="Quien ejecutará la actividad" /></div>
                        </div>
                    <//>
                </div>
            `;
        };

        const AdminSettings = () => {
            const { config } = useApp();
            const [local, setLocal] = useState(config);
            const [tab, setTab] = useState('gen');

            const save = async () => {
                await setDoc(doc(db, "config", "global"), local);
                alert("Configuración Maestra Actualizada");
            };

            const addMun = () => {
                const n = prompt("Nombre municipio:");
                if(n) setLocal({...local, municipios: [...local.municipios, {id: Date.now().toString(), n}]});
            };

            return html`
                <div class="space-y-12 animate-in pb-20">
                    <div class="flex justify-between items-end">
                        <h1 class="text-3xl font-black text-slate-950 tracking-tighter uppercase">Configuración de Plataforma</h1>
                        <button onClick=${save} class="btn-primary shadow-2xl">Guardar Parametrización</button>
                    </div>

                    <div class="flex gap-12">
                        <div class="w-72 space-y-2">
                            ${[
                                { id: 'gen', l: 'Estructura', i: 'dash' },
                                { id: 'mun', l: 'Municipios', i: 'exec' },
                                { id: 'ui', l: 'Diseño e Identidad', i: 'settings' }
                            ].map(t => html`
                                <button onClick=${() => setTab(t.id)} class="sidebar-link w-full ${tab === t.id ? 'active' : ''}">
                                    <${Icon} name=${t.i} size=${14} /> ${t.l}
                                </button>
                            `)}
                        </div>

                        <div class="flex-1 card p-12 min-h-[500px]">
                            ${tab === 'gen' && html`
                                <div class="space-y-10 animate-in">
                                    <h3 class="text-xs font-black uppercase tracking-widest border-b pb-6">Parámetros Globales</h3>
                                    <div class="grid grid-cols-2 gap-10">
                                        <div class="space-y-2"><label class="text-[10px] font-black text-slate-400 uppercase">Nombre Institución</label>
                                        <input value=${local.institution} onInput=${e => setLocal({...local, institution: e.target.value})} /></div>
                                        <div class="space-y-2"><label class="text-[10px] font-black text-slate-400 uppercase">Departamento</label>
                                        <input value=${local.departmentName} onInput=${e => setLocal({...local, departmentName: e.target.value})} /></div>
                                        <div class="space-y-2"><label class="text-[10px] font-black text-slate-400 uppercase">Meta Mensual</label>
                                        <input type="number" value=${local.metas?.mensual} onInput=${e => setLocal({...local, metas: {...local.metas, mensual: e.target.value}})} /></div>
                                    </div>
                                </div>
                            `}
                            ${tab === 'mun' && html`
                                <div class="space-y-10 animate-in">
                                    <div class="flex justify-between items-center border-b pb-6">
                                        <h3 class="text-xs font-black uppercase tracking-widest">Zonificación Territorial</h3>
                                        <button onClick=${addMun} class="btn-primary py-2 px-6">Agregar</button>
                                    </div>
                                    <div class="grid grid-cols-4 gap-4">
                                        ${local.municipios?.map(m => html`
                                            <div class="p-4 bg-slate-50 border rounded-xl flex justify-between items-center group">
                                                <span class="text-[10px] font-black uppercase">${m.n}</span>
                                                <button onClick=${() => setLocal({...local, municipios: local.municipios.filter(x => x.id !== m.id)})} class="text-red-300 opacity-0 group-hover:opacity-100 transition-all"><${Icon} name="logout" size=${14}/></button>
                                            </div>
                                        `)}
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        };

        const Shell = ({ currentView, setView, children }) => {
            const { userData, logout } = useApp();
            const nav = [
                { id: 'dash', l: 'Panel', i: 'dash' },
                { id: 'plan', l: 'Planeación', i: 'plan' },
                { id: 'exec', l: 'Ejecución', i: 'exec' },
                { id: 'actas', l: 'Actas', i: 'actas' },
                { id: 'settings', l: 'Admin', i: 'settings' }
            ].filter(v => userData.role === 'admin' || v.id !== 'settings');

            return html`
                <div class="min-h-screen flex">
                    <aside class="w-80 bg-white border-r flex flex-col fixed inset-y-0 p-10">
                        <div class="mb-16">
                            <h2 class="text-2xl font-black tracking-tighter uppercase mb-1">SICP</h2>
                            <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Observatorio de Salud</p>
                        </div>
                        <nav class="flex-1 space-y-2">
                                ${nav.map(n => html`
                                    <button onClick=${() => setView(n.id)} class="sidebar-link w-full ${currentView === n.id ? 'active' : ''}">
                                        <${Icon} name=${n.i} /> ${n.l}
                                    </button>
                                `)}
                        </nav>
                        <div class="pt-10 border-t border-slate-50 space-y-6">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center font-black text-slate-400 uppercase">${userData.name.charAt(0)}</div>
                                <div><p class="font-black text-[11px] uppercase">${userData.name}</p><p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${userData.role}</p></div>
                            </div>
                            <button onClick=${logout} class="sidebar-link w-full text-red-400 hover:text-red-500"><${Icon} name="logout"/> Salir</button>
                        </div>
                    </aside>
                    <main class="flex-1 ml-80 p-16">${children}</main>
                </div>
            `;
        };

        const Auth = () => {
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);

            const login = async e => {
                e.preventDefault();
                setLoading(true);
                try { await signInWithEmailAndPassword(auth, email, pass); }
                catch(e) { alert(e.message); }
                finally { setLoading(false); }
            };

            return html`
                <div class="min-h-screen flex items-center justify-center bg-slate-950 p-6 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[100px] -mr-[300px] -mt-[300px]"></div>
                    <div class="card max-w-md w-full bg-slate-900 border-white/5 p-16 shadow-2xl relative z-10">
                        <div class="text-center mb-16">
                            <div class="w-20 h-20 bg-slate-800 rounded-3xl mb-8 mx-auto border border-white/5 shadow-2xl flex items-center justify-center"><div class="w-10 h-1 border-ids-red bg-ids-red"></div></div>
                            <h1 class="text-white text-4xl font-black tracking-tighter uppercase mb-2">SICP 2026</h1>
                            <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.34em]">Health Intelligence Platform</p>
                        </div>
                        <form onSubmit=${login} class="space-y-8">
                            <div class="space-y-2"><label class="text-[10px] text-slate-500 font-black uppercase tracking-widest">Email Corporativo</label>
                            <input type="email" required onInput=${e => setEmail(e.target.value)} class="bg-slate-800/50 border-white/5 text-white" /></div>
                            <div class="space-y-2"><label class="text-[10px] text-slate-500 font-black uppercase tracking-widest">Contraseña</label>
                            <input type="password" required onInput=${e => setPass(e.target.value)} class="bg-slate-800/50 border-white/5 text-white" /></div>
                            <button type="submit" disabled=${loading} class="w-full py-5 bg-white text-slate-950 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl shadow-white/5">${loading ? '...' : 'Acceder al Sistema'}</button>
                        </form>
                    </div>
                </div>
            `;
        };

        const Main = () => {
            const { user, userData, loading } = useApp();
            const [view, setView] = useState('dash');
            const [caps, setCaps] = useState([]);
            const [plans, setPlans] = useState([]);

            useEffect(() => {
                if(!userData) return;
                onSnapshot(collection(db, "capacitaciones"), s => setCaps(s.docs.map(x=>({id:x.id, ...x.data()}))));
                onSnapshot(collection(db, "plans"), s => setPlans(s.docs.map(x=>({id:x.id, ...x.data()}))));
            }, [userData]);

            if (loading) return html`<div class="min-h-screen flex items-center justify-center bg-slate-50 font-black uppercase tracking-widest animate-pulse">SICP Sincronizando...</div>`;
            if (!user) return html`<${Auth} />`;
            if (userData?.status === 'pending') return html`<div class="min-h-screen flex items-center justify-center p-12 bg-slate-950 text-white flex-col gap-6"><div class="p-8 bg-slate-900 rounded-3xl border border-white/10 text-center space-y-4"> <h2 class="text-3xl font-black uppercase tracking-tighter">Acceso Reservado</h2><p class="text-slate-400 font-bold italic opacity-60">Su perfil se encuentra en etapa de validación administrativa.</p></div><button onClick=${()=>window.location.reload()} class="btn-primary bg-white text-black">Refrescar Estado</button></div>`;

            return html`
                <${Shell} currentView=${view} setView=${setView}>
                    ${view === 'dash' && html`<${Dashboard} caps=${caps} plans=${plans} />`}
                    ${view === 'plan' && html`<${Planning} plans=${plans} />`}
                    ${view === 'settings' && html`<${AdminSettings} />`}
                    ${!['dash','plan','settings'].includes(view) && html`<div class="py-40 text-center opacity-20 filter grayscale"><${Icon} name="exec" size=${64}/><p class="text-xs font-black uppercase tracking-widest mt-8">Sincronización en curso</p></div>`}
                <//>
            `;
        };

        render(html`<${AppProvider}><${Main} /><//>`, document.getElementById('root'));
    </script>
</body>
</html>
