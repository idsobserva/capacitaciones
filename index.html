<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODS - Sistema IDS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZ5KZsb0CEVxQdR6To8RhjPdVHmPnm_Jw",
  authDomain: "capacitacionesids.firebaseapp.com",
  projectId: "capacitacionesids",
  storageBucket: "capacitacionesids.firebasestorage.app",
  messagingSenderId: "758439138023",
  appId: "1:758439138023:web:58c5b801baf8bffe9c4842",
  measurementId: "G-16PTJ4FX2S"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.db=db;
window.auth=auth;
window.addDoc=addDoc;
window.getDocs=getDocs;
window.updateDoc=updateDoc;
window.doc=doc;
window.getDoc=getDoc;
window.setDoc=setDoc;
window.collection=collection;
window.signInWithEmailAndPassword=signInWithEmailAndPassword;
window.onAuthStateChanged=onAuthStateChanged;
window.signOut=signOut;
</script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
.nav{background:#9e1c1c;color:#fff;padding:15px;display:flex;gap:10px}
.nav button{background:none;border:none;color:#fff;cursor:pointer}
.container{padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
.view{display:none}
.active{display:block}
input,textarea,select{width:100%;padding:8px;margin:5px 0}
button{background:#9e1c1c;color:#fff;padding:8px;border:none;border-radius:5px}
.badge{padding:4px 8px;border-radius:6px}
.p{background:#fde68a}
.a{background:#86efac}
</style>
</head>

<body>

<div id="login" class="container">
<div class="card">
<h2>Ingreso ODS - IDS</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div>
</div>

<div id="app" class="view">

<div class="nav">
<button onclick="show('dash')">Dashboard</button>
<button onclick="show('actas')">Actas</button>
<button onclick="show('config')">Configuración</button>
<button onclick="logout()">Salir</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dash" class="view active">
<div class="card">
<h3>Indicadores</h3>
<div id="stats"></div>
<canvas id="chart"></canvas>
</div>
</div>

<!-- ACTAS -->
<div id="actas" class="view">
<div class="card">
<h3>Nueva Acta</h3>
<input id="nombre" placeholder="Nombre">

<select id="grupo"></select>

<textarea id="objetivos" placeholder="Objetivos"></textarea>
<textarea id="desarrollo" placeholder="Desarrollo"></textarea>
<textarea id="compromisos" placeholder="Compromisos"></textarea>
<input id="evidencias" placeholder="Link evidencias">

<select id="municipios" multiple>
<option>Cúcuta</option>
<option>Ocaña</option>
<option>Pamplona</option>
<option>Los Patios</option>
</select>

<button onclick="guardarActa()">Guardar</button>
</div>

<div id="lista"></div>
</div>

<!-- CONFIG -->
<div id="config" class="view">

<div class="card">
<h3>Usuarios</h3>
<div id="usuarios"></div>
</div>

<div class="card">
<h3>Grupos</h3>
<button onclick="cargarGruposIniciales()">Cargar grupos automáticamente</button>
<div id="listaGrupos"></div>
</div>

</div>

</div>
</div>

<script>

let ROLE='contratista';
let UID='';
const ROLES_APROBACION=['admin','coordinador','jefe'];

onAuthStateChanged(auth, async (u)=>{
 if(u){
  UID=u.uid;

  const ref=doc(db,'users',UID);
  const snap=await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{rol:'contratista'});
  }

  ROLE=(await getDoc(ref)).data().rol;

  login.style.display='none';
  app.style.display='block';

  cargarGrupos();
  cargar();
  dashboard();

  if(ROLE==='admin'){
    cargarUsuarios();
    cargarGruposAdmin();
  }
 }
});

async function login(){
 await signInWithEmailAndPassword(auth,email.value,password.value);
}

function logout(){signOut(auth)}

function show(v){
 document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
 document.getElementById(v).classList.add('active');
}

async function cargarGrupos(){
 const snap = await getDocs(collection(db,'grupos'));
 let html='';
 snap.forEach(d=>{
  html+=`<option>${d.data().nombre}</option>`;
 });
 grupo.innerHTML=html;
}

async function cargarGruposIniciales(){
 const lista = [
   {nombre:"Grupo de salud pública",tipo:"grupo",responsable:"Juan Enrique Galvis"},
   {nombre:"Programa de salud ambiental",tipo:"programa",responsable:"Miryam Reyes Ortega"},
   {nombre:"Programa de medicamentos",tipo:"programa",responsable:"Almilcar Marquez"}
 ];

 for(const g of lista){
   await addDoc(collection(db,'grupos'),g);
 }

 alert("Grupos cargados");
 cargarGrupos();
}

async function guardarActa(){
 const municipiosSel=[...municipios.selectedOptions].map(o=>o.value);

 await addDoc(collection(db,'actas'),{
  nombre:nombre.value,
  grupo:grupo.value,
  objetivos:objetivos.value,
  desarrollo:desarrollo.value,
  compromisos:compromisos.value,
  evidencias:evidencias.value,
  municipios:municipiosSel,
  estado:'Pendiente',
  historial:[{
    accion:'creado',
    usuario:UID,
    rol:ROLE,
    fecha:new Date().toISOString()
  }]
 });

 cargar();
}

async function aprobar(id){
 if(!ROLES_APROBACION.includes(ROLE)) return;

 const ref=doc(db,'actas',id);
 const snap=await getDoc(ref);
 const data=snap.data();

 const hist=data.historial || [];

 hist.push({
  accion:'aprobado',
  usuario:UID,
  rol:ROLE,
  fecha:new Date().toISOString()
 });

 await updateDoc(ref,{
  estado:'Aprobada',
  historial:hist
 });

 cargar();
}

async function cargar(){
 const snap=await getDocs(collection(db,'actas'));
 let html='';

 snap.forEach(d=>{
  const x=d.data();

  html+=`
  <div class='card'>
  <b>${x.nombre}</b> (${x.grupo})<br>
  <span class='badge ${x.estado==='Aprobada'?'a':'p'}'>${x.estado}</span><br>
  <button onclick="aprobar('${d.id}')">Aprobar</button>
  </div>
  `;
 });

 lista.innerHTML=html;
}

async function dashboard(){
 const snap=await getDocs(collection(db,'actas'));
 let total=0;

 snap.forEach(()=>total++);

 stats.innerText="Total actas: "+total;
}

async function cargarUsuarios(){
 const snap=await getDocs(collection(db,'users'));
 let html='';

 snap.forEach(d=>{
  html+=`<div>${d.id}</div>`;
 });

 usuarios.innerHTML=html;
}

async function cargarGruposAdmin(){
 const snap=await getDocs(collection(db,'grupos'));
 let html='';

 snap.forEach(d=>{
  html+=`<div>${d.data().nombre}</div>`;
 });

 listaGrupos.innerHTML=html;
}

</script>

</body>
</html>
